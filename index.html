<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimbel's Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-banner">
        <div class="banner-content">
            <p class="eyebrow">Welcome to</p>
            <h1>Dimbel's Journal</h1>
            <p class="subtitle">A thoughtful place for entry-driven posts and reflections.</p>
        </div>
    </header>

    <main class="layout-shell">
        <section id="entry-display" class="entry-panel">
            <div class="entry-placeholder">
                <p>Select an entry from the list to read it here.</p>
            </div>
        </section>

        <aside class="entry-list-panel">
            <div class="panel-header">
                <h2>Entries</h2>
            </div>
            <nav id="entry-list" class="entry-list">
            </nav>

            <section class="upload-panel">
                <h3>Upload a new entry</h3>
                <p>Choose a text or markdown file and enter your upload key.</p>
                <input id="entry-file-input" type="file" accept=".txt,.md" />
                <input id="upload-key" type="password" placeholder="Upload key" />
                <button id="upload-entry-btn" type="button">Add entry</button>
                <p id="upload-message" class="upload-message">Your file will be added to the entry list after upload.</p>
            </section>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
