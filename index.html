<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimbel's Journal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="page-banner">
        <div class="banner-content">
            <p class="eyebrow">Welcome to</p>
            <h1 class="site-title" onclick="goHome()" style="cursor: pointer;">Dimbel's Journal</h1>
        </div>
    </header>

    <main class="layout-shell">
        <section id="entry-display" class="entry-panel">
        </section>
        <aside class="entry-list-panel">
            <div class="panel-header">
                <h2>Entries</h2>
            </div>
            <nav id="entry-list" class="entry-list">
            </nav>
        </aside>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
